<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Qurban At-Taqwa 1447H</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        @media print {
          body { background: white !important; margin: 0; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
          .no-print { display: none !important; }
          @page { size: A4 portrait; margin: 4mm; }
        }
        .break-after-page { page-break-after: always; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        #reader { border: none !important; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 pb-10 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBMiOHcgsIpUpF0RyA4Upm31vyXvk3lyxI",
            authDomain: "qurban-1447h-d8dae.firebaseapp.com",
            projectId: "qurban-1447h-d8dae",
            storageBucket: "qurban-1447h-d8dae.firebasestorage.app",
            messagingSenderId: "772465251852",
            appId: "1:772465251852:web:5f03f2290bbc7db68a4029",
            measurementId: "G-HXYB4X4LP3"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'qurban-manager-1447h';

        const playSound = (type) => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            if (type === 'success') {
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.2);
            } else {
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.5);
            }
        };

        const Icon = ({ name, size = 20, className = "" }) => (
            <i data-lucide={name} className={className} style={{width: size, height: size, display: 'inline-block'}}></i>
        );

        const App = () => {
          const [user, setUser] = useState(null);
          const [recipients, setRecipients] = useState([]);
          const [loading, setLoading] = useState(true);
          const [view, setView] = useState('dashboard'); 
          const [searchTerm, setSearchTerm] = useState('');
          const [sortBy, setSortBy] = useState('no'); 
          const [newName, setNewName] = useState('');
          const [newRT, setNewRT] = useState('');
          const [importModal, setImportModal] = useState(false);
          const [importData, setImportData] = useState([]);
          const [isImporting, setIsImporting] = useState(false);
          const [selectedIds, setSelectedIds] = useState([]);
          const [scanMessage, setScanMessage] = useState({ type: '', text: '' });
          const [customLogo, setCustomLogo] = useState(null);

          const recipientsRef = useRef(recipients);
          const lastScanRef = useRef({ id: null, time: 0 });

          useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
          useEffect(() => { recipientsRef.current = recipients; }, [recipients]);

          useEffect(() => {
              let html5QrcodeScanner;
              if (view === 'scan') {
                  html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                  html5QrcodeScanner.render((decodedText) => {
                      const now = Date.now();
                      if (lastScanRef.current.id === decodedText && (now - lastScanRef.current.time < 3000)) return; 
                      lastScanRef.current = { id: decodedText, time: now };
                      const foundUser = recipientsRef.current.find(u => u.id === decodedText);
                      if (foundUser) {
                          if (foundUser.status === 'taken') {
                              playSound('error');
                              setScanMessage({type: 'error', text: `❌ ${foundUser.name} SUDAH AMBIL!`});
                          } else {
                              playSound('success');
                              db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients').doc(foundUser.id).update({ status: 'taken', takenAt: Date.now() });
                              setScanMessage({type: 'success', text: `✅ BERHASIL: ${foundUser.name}`});
                          }
                      } else { playSound('error'); setScanMessage({type: 'error', text: `⚠️ QR TIDAK DIKENAL!`}); }
                      setTimeout(() => { setScanMessage({type: '', text: ''}); }, 2500);
                  }, (error) => {});
              }
              return () => { if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => {}); };
          }, [view]);

          useEffect(() => {
            auth.signInAnonymously().catch(e => console.error(e));
            return auth.onAuthStateChanged(setUser);
          }, []);

          useEffect(() => {
            if (!user) return;
            const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients');
            const unsubscribe = colRef.onSnapshot((snapshot) => {
                setRecipients(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                setLoading(false);
            }, (error) => { console.error(error); setLoading(false); });
            return () => unsubscribe();
          }, [user]);

          const processedRecipients = useMemo(() => {
            let result = recipients.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()) || r.rt.toLowerCase().includes(searchTerm.toLowerCase()));
            result.sort((a, b) => {
              if (sortBy === 'no') return (a.no || 0) - (b.no || 0);
              if (sortBy === 'name') return a.name.localeCompare(b.name);
              if (sortBy === 'rt') return a.rt.localeCompare(b.rt, undefined, {numeric: true});
              if (sortBy === 'status') return a.status === b.status ? 0 : a.status === 'taken' ? 1 : -1;
              return (b.timestamp || 0) - (a.timestamp || 0);
            });
            return result;
          }, [recipients, searchTerm, sortBy]);

          const chunkedPrintData = useMemo(() => {
              const sorted = [...recipients].sort((a, b) => (a.no || 0) - (b.no || 0));
              const chunks = [];
              for (let i = 0; i < sorted.length; i += 28) chunks.push(sorted.slice(i, i + 28));
              return chunks;
          }, [recipients]);

          const exportToExcel = () => {
              const dataToExport = [...recipients].sort((a, b) => (a.no || 0) - (b.no || 0)).map(r => ({ "No. Urut": r.no || '-', "Nama": r.name, "RT": r.rt, "Status": r.status === 'taken' ? 'SUDAH DIAMBIL' : 'BELUM DIAMBIL' }));
              const worksheet = XLSX.utils.json_to_sheet(dataToExport);
              const workbook = XLSX.utils.book_new();
              XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Qurban");
              XLSX.writeFile(workbook, `Laporan_Qurban_At-Taqwa.xlsx`);
          };

          const handleSelectAll = (e) => { e.target.checked ? setSelectedIds(processedRecipients.map(r => r.id)) : setSelectedIds([]); };
          const toggleSelect = (id) => { setSelectedIds(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]); };

          const bulkMarkAsTaken = async () => {
              if (!window.confirm(`Tandai ${selectedIds.length} warga?`)) return;
              const batch = db.batch();
              selectedIds.forEach(id => { const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients').doc(id); batch.update(docRef, { status: 'taken', takenAt: Date.now() }); });
              await batch.commit(); setSelectedIds([]);
          };

          const bulkDelete = async () => {
              if (!window.confirm(`HAPUS ${selectedIds.length} data?`)) return;
              const batch = db.batch();
              selectedIds.forEach(id => { const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients').doc(id); batch.delete(docRef); });
              await batch.commit(); setSelectedIds([]);
          };

          const addRecipient = async (e) => {
            e.preventDefault();
            if (!newName.trim()) return;
            const currentMaxNo = recipientsRef.current.reduce((max, r) => Math.max(max, r.no || 0), 0);
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients').add({ name: newName, rt: newRT || '-', status: 'pending', timestamp: Date.now(), updatedBy: user.uid, no: currentMaxNo + 1 });
            setNewName(''); setNewRT('');
          };

          const processImport = async () => {
            setIsImporting(true);
            const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients');
            const sortedImport = [...importData].sort((a, b) => String(a.rt).localeCompare(String(b.rt), undefined, {numeric: true}));
            let currentMaxNo = recipientsRef.current.reduce((max, r) => Math.max(max, r.no || 0), 0);
            const chunks = [];
            for (let i = 0; i < sortedImport.length; i += 400) chunks.push(sortedImport.slice(i, i + 400));
            try {
              for (const chunk of chunks) {
                const batch = db.batch();
                chunk.forEach(item => { currentMaxNo++; const newDocRef = colRef.doc(); batch.set(newDocRef, { ...item, status: 'pending', timestamp: Date.now(), updatedBy: user.uid, no: currentMaxNo }); });
                await batch.commit();
              }
              setImportModal(false);
            } catch (error) {} finally { setIsImporting(false); }
          };

          const toggleStatus = async (id, currentStatus) => {
            const newStatus = currentStatus === 'taken' ? 'pending' : 'taken';
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients').doc(id).update({ status: newStatus, takenAt: newStatus === 'taken' ? Date.now() : null });
          };
          
          const deleteRecipient = async (id) => { if(window.confirm('Hapus?')) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('recipients').doc(id).delete(); };

          const downloadPDF = () => {
            const element = document.getElementById('print-area');
            const opt = {
              margin: 5, filename: 'Kupon_At-Taqwa.pdf',
              image: { type: 'jpeg', quality: 0.98 },
              html2canvas: { scale: 2, useCORS: true, logging: false },
              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            setScanMessage({ type: 'success', text: "Menyiapkan PDF..." });
            setTimeout(() => {
              window.html2pdf().from(element).set(opt).save().then(() => setScanMessage({ type: '', text: "" }));
            }, 1500);
          };

          const stats = { total: recipients.length, taken: recipients.filter(r => r.status === 'taken').length, pending: recipients.filter(r => r.status === 'pending').length };

          if (loading) return <div className="flex h-screen items-center justify-center bg-slate-50"><div className="animate-spin rounded-full h-10 w-10 border-4 border-emerald-600 border-t-transparent"></div></div>;

          return (
            <div className="min-h-screen">
              <header className="bg-emerald-900 text-white p-4 shadow-md no-print sticky top-0 z-20">
                <div className="max-w-5xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-2">
                    <Icon name="qr-code" className="text-emerald-400" size={24} />
                    <div><h1 className="text-sm font-black leading-tight uppercase">At-Taqwa Qurban</h1><p className="text-[10px] opacity-70 font-bold uppercase tracking-widest">System 1447H</p></div>
                  </div>
                  <button onClick={() => setView('scan')} className="bg-emerald-500 p-2.5 rounded-full shadow-lg active:scale-90 flex items-center gap-2"><Icon name="scan" size={20} /><span className="text-xs font-bold hidden sm:block uppercase">Scan</span></button>
                </div>
              </header>

              <main className="max-w-5xl mx-auto p-4">
                <nav className="flex bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 overflow-hidden no-print">
                  <button onClick={() => setView('dashboard')} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${view === 'dashboard' ? 'bg-emerald-50 text-emerald-800 border-b-4 border-emerald-800' : 'text-slate-400'}`}><Icon name="clock" size={20} /><span className="text-[10px] font-black uppercase">Panel</span></button>
                  <button onClick={() => setView('list')} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${view === 'list' ? 'bg-emerald-50 text-emerald-800 border-b-4 border-emerald-800' : 'text-slate-400'}`}><Icon name="users" size={20} /><span className="text-[10px] font-black uppercase">Warga</span></button>
                  <button onClick={() => setView('print')} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${view === 'print' ? 'bg-emerald-50 text-emerald-800 border-b-4 border-emerald-800' : 'text-slate-400'}`}><Icon name="printer" size={20} /><span className="text-[10px] font-black uppercase">Cetak</span></button>
                </nav>

                {view === 'dashboard' && (
                  <div className="space-y-6 no-print">
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
                      <div className="bg-white p-6 rounded-3xl border border-slate-200 font-black"><p className="text-slate-400 text-xs uppercase">Total</p><p className="text-4xl">{stats.total}</p></div>
                      <div className="bg-emerald-600 p-6 rounded-3xl text-white shadow-lg font-black"><p className="text-emerald-200 text-xs uppercase">Sudah</p><p className="text-4xl">{stats.taken}</p></div>
                      <div className="bg-white p-6 rounded-3xl border border-slate-200 text-red-500 font-black"><p className="text-xs uppercase">Sisa</p><p className="text-4xl">{stats.pending}</p></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-white p-8 rounded-3xl border border-slate-200">
                            <h2 className="font-black mb-6 uppercase flex items-center gap-2"><Icon name="plus" size={20} /> Input Baru</h2>
                            <form onSubmit={addRecipient} className="space-y-3">
                                <input className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 font-bold" placeholder="Nama" value={newName} onChange={e => setNewName(e.target.value)} required />
                                <input className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 font-bold" placeholder="RT" value={newRT} onChange={e => setNewRT(e.target.value)} />
                                <button type="submit" className="w-full bg-emerald-700 text-white font-black rounded-2xl py-4 uppercase">Simpan</button>
                            </form>
                        </div>
                        <div className="flex flex-col gap-4">
                            <div className="bg-slate-900 text-white p-8 rounded-[40px] relative overflow-hidden flex-1">
                                <h3 className="text-xl font-black mb-1 italic uppercase">Impor Excel</h3>
                                <label className="cursor-pointer bg-white text-slate-900 px-6 py-3 rounded-2xl font-black text-xs inline-flex items-center gap-2 mt-4">
                                    <Icon name="file-up" size={16}/> PILIH FILE
                                    <input type="file" className="hidden" accept=".xlsx" onChange={async (e) => {
                                        const reader = new FileReader();
                                        reader.onload = (evt) => {
                                            const wb = window.XLSX.read(evt.target.result, { type: 'binary' });
                                            const data = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                                            setImportData(data.map(row => ({ name: String(row.Nama || row.nama || '---'), rt: String(row.RT || row.rt || '-') })));
                                            setImportModal(true);
                                        };
                                        reader.readAsBinaryString(e.target.files[0]);
                                    }} />
                                </label>
                            </div>
                            <button onClick={exportToExcel} className="bg-emerald-100 border-2 border-emerald-200 text-emerald-800 p-8 rounded-[40px] flex items-center justify-between hover:bg-emerald-200 transition-all">
                                <div><h3 className="text-xl font-black uppercase italic leading-none">Export</h3><p className="text-emerald-600 text-[10px] font-bold mt-1 uppercase">Laporan Excel</p></div>
                                <Icon name="download" size={32} />
                            </button>
                        </div>
                    </div>
                  </div>
                )}

                {view === 'list' && (
                  <div className="space-y-4 no-print">
                    <div className="flex flex-col sm:flex-row gap-3">
                      <div className="flex-1 relative"><Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} /><input type="text" placeholder="Cari..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full bg-white border border-slate-200 rounded-2xl pl-12 pr-4 py-4 font-bold shadow-sm" /></div>
                      <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="bg-white border border-slate-200 rounded-2xl px-4 py-4 font-bold text-sm">
                          <option value="no">No. Urut</option><option value="name">A-Z</option><option value="rt">RT</option><option value="status">Belum</option>
                      </select>
                    </div>
                    {selectedIds.length > 0 && <div className="flex items-center gap-3 p-4 bg-emerald-100 rounded-2xl border border-emerald-200"><span className="font-black text-emerald-800 flex-1">{selectedIds.length} Dipilih</span><button onClick={bulkMarkAsTaken} className="bg-emerald-600 text-white px-4 py-2 rounded-xl font-black text-xs uppercase">Ambil</button><button onClick={bulkDelete} className="bg-red-600 text-white px-4 py-2 rounded-xl font-black text-xs uppercase">Hapus</button></div>}
                    <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden divide-y divide-slate-100 shadow-sm">
                      <div className="p-3 bg-slate-50 flex items-center gap-4 font-black text-[10px] uppercase text-slate-400"><input type="checkbox" onChange={handleSelectAll} checked={selectedIds.length === processedRecipients.length && recipients.length > 0} className="w-5 h-5 accent-emerald-600" /> Pilih Semua</div>
                      {processedRecipients.map((r) => (
                        <div key={r.id} className={`p-3 flex items-center justify-between border-l-[6px] ${r.status === 'taken' ? 'bg-red-50/50 border-red-500' : 'bg-white border-transparent'}`}>
                          <div className="flex items-center gap-4 overflow-hidden"><input type="checkbox" checked={selectedIds.includes(r.id)} onChange={() => toggleSelect(r.id)} className="w-5 h-5 accent-emerald-600" /><span className="text-[10px] font-black text-slate-300 w-6">{r.no ? r.no.toString().padStart(3,'0') : '---'}</span><div className="flex flex-wrap items-center gap-2"><p className={`text-base font-black uppercase leading-none ${r.status === 'taken' ? 'text-red-700 line-through opacity-70' : 'text-slate-800'}`}>{r.name}</p><span className={`text-sm font-black px-2 py-0.5 rounded-md border ${r.status === 'taken' ? 'border-red-300 bg-red-100' : 'border-emerald-200 bg-emerald-50'}`}>RT {r.rt}</span></div></div>
                          <div className="flex gap-1"><button onClick={() => toggleStatus(r.id, r.status)} className={`p-2.5 rounded-xl ${r.status === 'taken' ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-400'}`}><Icon name="check-circle" size={20}/></button><button onClick={() => deleteRecipient(r.id)} className="p-2.5 text-slate-300 hover:text-red-500"><Icon name="trash-2" size={18}/></button></div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {view === 'print' && (
                  <div className="space-y-6">
                    <div className="bg-slate-900 text-white p-8 rounded-[40px] no-print flex flex-col md:flex-row gap-6 items-center">
                        <div className="flex-1 text-center md:text-left"><h2 className="text-2xl font-black uppercase">Cetak Kupon</h2><p className="text-slate-400 text-xs">A4 portrait: 28 kupon.</p></div>
                        <div className="flex gap-2 w-full md:w-auto">
                            <label className="flex-1 cursor-pointer bg-white/10 text-white px-4 py-4 rounded-2xl font-black text-xs text-center border border-white/20"><Icon name="image" size={16} className="mr-1"/> LOGO BG<input type="file" accept="image/*" className="hidden" onChange={(e) => { if(e.target.files[0]){ const r = new FileReader(); r.onload=(ev)=>setCustomLogo(ev.target.result); r.readAsDataURL(e.target.files[0]); }}}/></label>
                            <button onClick={downloadPDF} className="flex-1 bg-white text-slate-900 px-6 py-4 rounded-2xl font-black text-xs uppercase">PDF</button>
                            <button onClick={() => window.print()} className="flex-1 bg-emerald-500 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase">Print</button>
                        </div>
                    </div>
                    <div id="print-area">
                      {chunkedPrintData.map((page, pIdx) => (
                        <div key={pIdx} className="w-full grid grid-cols-4 border-r border-b border-black bg-white break-after-page" style={{ height: '280mm', gridTemplateRows: 'repeat(7, 1fr)' }}>
                          {page.map((r) => (
                            <div key={r.id} className="relative border-t border-l border-black p-1 flex flex-col overflow-hidden box-border h-full">
                              {customLogo && <div className="absolute inset-0 flex items-center justify-end p-1.5 opacity-20"><img src={customLogo} className="h-[85%] object-contain object-right" crossOrigin="anonymous" /></div>}
                              <div className="text-center border-b-[0.5px] border-black mb-1 pb-0.5 relative z-10"><p className="text-[6.5px] font-black uppercase tracking-tighter">panitia qurban 1447 H</p><p className="text-[7.5px] font-black uppercase">Masjid At-Taqwa</p></div>
                              <div className="flex-1 flex gap-1.5 relative z-10">
                                <div className="w-[45%] border-r-[0.5px] border-black border-dashed pr-1 flex items-center justify-center">
                                    <div className="w-full aspect-square border border-black p-0.5 bg-white">
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${r.id}`} className="w-full h-full" crossOrigin="anonymous" />
                                    </div>
                                </div>
                                <div className="w-[55%] flex flex-col py-0.5">
                                  <div className="text-[8px] font-black mb-1 uppercase">NO. {r.no || '-'}</div>
                                  <div className="flex-1 flex items-center"><h3 className={`font-black uppercase leading-[0.9] line-clamp-3 ${r.name.length > 25 ? 'text-[11px]' : 'text-[14px]'}`}>{r.name}</h3></div>
                                  <div className="mt-auto flex justify-start"><span className="text-[9px] font-black border-[1.5px] border-black px-1.5 bg-white uppercase">RT {r.rt}</span></div>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {view === 'scan' && (
                  <div className="fixed inset-0 bg-slate-950 z-[100] flex flex-col">
                    <div className="p-4 flex justify-between bg-slate-900 text-white border-b border-white/10"><h2 className="font-black uppercase text-emerald-400 text-sm tracking-widest">Scanner Aktif</h2><button onClick={() => setView('list')} className="p-2 bg-white/10 rounded-full"><Icon name="x"/></button></div>
                    <div className="flex-1 flex flex-col items-center justify-center p-4 bg-black relative">
                      {scanMessage.text && <div className={`absolute top-10 px-6 py-3 rounded-full font-black text-sm uppercase animate-bounce border-2 shadow-2xl ${scanMessage.type === 'success' ? 'bg-emerald-500 border-emerald-300' : 'bg-red-600 border-red-300'} text-white z-[200]`}>{scanMessage.text}</div>}
                      <div className="w-full max-w-sm bg-white rounded-3xl overflow-hidden shadow-2xl border-4 border-emerald-500/20"><div id="reader" className="w-full"></div></div>
                      <p className="mt-8 text-white/50 text-xs text-center italic">Batch Mode Aktif.</p>
                    </div>
                  </div>
                )}
              </main>

              {importModal && (
                <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[300] flex items-center justify-center p-4">
                  <div className="bg-white w-full max-w-md rounded-[50px] p-10 text-center shadow-2xl">
                    <h2 className="text-3xl font-black mb-2 uppercase italic">Konfirmasi</h2>
                    <p className="text-slate-500 text-sm mb-8 font-medium">Import {importData.length} warga?</p>
                    <div className="flex gap-4"><button onClick={() => setImportModal(false)} className="flex-1 font-bold text-slate-400 uppercase">Batal</button><button onClick={processImport} className="flex-1 py-5 bg-emerald-700 text-white font-black rounded-3xl uppercase">{isImporting ? 'Proses...' : 'Import'}</button></div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
